<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments.html :: head}"></head>
<body class="bg-light">
<nav th:replace="~{fragments.html :: main-nav}"></nav>

<div class="container">
    <div class="py-5 text-center">
        <h2>계정 만들기</h2>
        <p class="lead">Move Together에 오신 것을 환영합니다.</p>
    </div>
    <div class="row justify-content-center">
        <form class="needs-validation col-sm-6" action="#"
              th:action="@{/sign-up}" th:object="${signUpForm}"
              method="post" novalidate>
            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input id="nickname" type="text" th:field="*{nickname}"
                       class="form-control"
                       th:class="${#fields.hasErrors('nickname')} ? 'form-control is-invalid' : 'form-control'"
                       placeholder="닉네임" aria-describedby="nicknameHelp" required minlength="3" maxlength="20">
                <small id="nicknameHelp" class="form-text text-muted">
                    공백 없이 3자 이상 20자 이내로 입력하세요. 한글, 영문, 숫자, _, - 만 사용 가능합니다.
                </small>
                <small class="invalid-feedback" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></small>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input id="email" type="email" th:field="*{email}"
                       class="form-control"
                       th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                       placeholder="your@email.com" aria-describedby="emailHelp" required>
                <small id="emailHelp" class="form-text text-muted">
                    이메일을 정확히 입력하세요.
                </small>
                <small class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </div>
            <div class="form-group">
                <label for="password">패스워드</label>
                <input id="password" type="password" th:field="*{password}"
                       class="form-control"
                       th:class="${#fields.hasErrors('password')} ? 'form-control is-invalid' : 'form-control'"
                       placeholder="비밀번호" aria-describedby="passwordHelp" required minlength="8" maxlength="20">
                <small id="passwordHelp" class="form-text text-muted">
                    8자 이상 20자 이내로 입력하세요.
                </small>
                <small class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </div>

            <div class="form-group">
                <button class="btn btn-primary btn-block" type="submit">가입하기</button>
            </div>
            <div class="form-group">
                <small class="text-muted">
                    <a th:href="@{/login}">이미 계정이 있으신가요?</a>
                </small>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments.html :: footer}"></footer>
<script th:replace="~{fragments.html :: form-validation}"></script>
</body>
</html>
