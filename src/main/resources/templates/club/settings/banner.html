<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments.html :: head}"></head>
<body>
<nav th:replace="~{fragments.html :: main-nav}"></nav>
<div th:replace="~{fragments.html :: club-banner}"></div>
<div class="container">
    <div th:replace="~{fragments.html :: club-info}"></div>
    <div th:replace="~{fragments.html :: club-menu(clubMenu='settings')}"></div>
    <div class="row mt-3 justify-content-center">
        <div class="col-2">
            <div th:replace="~{fragments.html :: club-settings-menu(currentMenu='image')}"></div>
        </div>
            <div class="col-8">
                <div th:replace="~{fragments.html :: message}"></div>
                <div class="row">
                    <h2 class="col-sm-12">배너 이미지 사용</h2>
                </div>
                <form th:if="${!club.useBanner}" action="#" th:action="@{'/club/' + ${club.getPath()} + '/settings/banner/enable'}" method="post" novalidate>
                    <div class="alert alert-primary" role="alert">
                        클럽 메뉴에서 클럽 배너 이미지를 사용합니다. 클럽 배너 이미지를 아직 설정하지 않았다면, 기본 배너 이미지를 사용합니다.
                    </div>
                    <div class="form-group">
                        <button class="btn btn-outline-primary btn-block" type="submit" aria-describedby="submitHelp">배너 이미지 사용하기</button>
                    </div>
                </form>
                <form th:if="${club.useBanner}" action="#" th:action="@{'/club/' + ${club.getPath()} + '/settings/banner/disable'}" method="post" novalidate>
                    <div class="alert alert-info" role="alert">
                        클럽 메뉴에서 클럽 배너 이미지를 사용하지 않습니다. 클럽 목록에서는 배너 이미지를 사용합니다.
                    </div>
                    <div class="form-group">
                        <button class="btn btn-outline-primary btn-block" type="submit" aria-describedby="submitHelp">배너 이미지 사용하지 않기</button>
                    </div>
                </form>
                <hr/>
                <div class="row">
                    <h2 class="col-sm-12">배너 이미지 변경</h2>
                </div>
                <form id="imageForm" action="#" th:action="@{'/club/' + ${club.getPath()} + '/settings/banner'}" method="post" novalidate>
                    <div class="form-group">
                        <input id="clubImage" type="hidden" name="image" class="form-control" />
                    </div>
                </form>
                <div class="card text-center">
                    <div id="current-club-image" class="mt-3">
                        <img class="rounded" th:src="${#strings.isEmpty(club.image) ? '/images/defaultBanner.png' : club.image}" width="640" alt="name" th:alt="${club.title}"/>
                    </div>
                    <div id="new-club-image" class="mt-3"></div>
                    <div class="card-body">
                        <div class="custom-file">
                            <input type="file" class="custom-file-input" id="club-image-file">
                            <label class="custom-file-label" for="club-image-file">클럽 이미지 변경</label>
                        </div>
                        <div id="new-club-image-control" class="mt-3">
                            <button class="btn btn-outline-primary btn-block" id="cut-button">자르기</button>
                            <button class="btn btn-outline-success btn-block" id="confirm-button">확인</button>
                            <button class="btn btn-primary btn-block" id="save-button">저장</button>
                            <button class="btn btn-outline-warning btn-block" id="reset-button">취소</button>
                        </div>
                        <div id="cropped-new-club-image" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments.html :: footer}"></div>
    </div>
    <script th:replace="~{fragments.html :: tooltip}"></script>
    <link  href="/node_modules/cropper/dist/cropper.min.css" rel="stylesheet">
    <script src="/node_modules/cropper/dist/cropper.min.js"></script>
    <script src="/node_modules/jquery-cropper/dist/jquery-cropper.min.js"></script>
    <script th:src="@{/js/banner.js}"></script>
</body>
</html>
